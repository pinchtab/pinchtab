<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>IDPI Domain Pivot</title>
</head>
<body>
  <h1>Allowed Origin Before Pivot</h1>
  <p>This page starts on the fixtures origin, then pivots the tab to a blocked domain.</p>
  <script>
    setTimeout(function () {
      // Pivots to a second hostname served by the same nginx container via
      // a docker-compose network alias (see tests/e2e/docker-compose.yml).
      // `pivot-target` is intentionally NOT in the IDPI allowedDomains list,
      // so the policy fires, while the page still actually loads (unlike
      // example.com which is unreachable from inside the e2e network).
      window.location.href = "http://pivot-target/index.html";
    }, 250);
  </script>
</body>
</html>
