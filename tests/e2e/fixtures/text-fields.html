<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Test - Text Fields</title>
</head>
<body>
  <h1>Text Fields</h1>
  <form>
    <div>
      <label for="title">Title</label>
      <input type="text" id="title" name="title" placeholder="Enter a title">
    </div>
    <div>
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" rows="4" cols="40" placeholder="Enter notes"></textarea>
    </div>
  </form>
</body>
</html>
