<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Manager — PinchTab Benchmark</title>
</head>
<body>
  <header>
    <h1>Task Manager — VERIFY_SPA_PAGE_99999</h1>
    <nav>
      <button id="tab-all" class="tab active" onclick="showTab('all')">All Tasks</button>
      <button id="tab-active" class="tab" onclick="showTab('active')">Active</button>
      <button id="tab-done" class="tab" onclick="showTab('done')">Completed</button>
    </nav>
  </header>
  <main>
    <section id="add-task-section">
      <input type="text" id="new-task-input" placeholder="Add a new task...">
      <select id="priority-select">
        <option value="low">Low Priority</option>
        <option value="medium" selected>Medium Priority</option>
        <option value="high">High Priority</option>
      </select>
      <button id="add-task-btn">Add Task</button>
    </section>

    <section id="task-list">
      <div id="tab-all-content">
        <h2>All Tasks (<span id="total-count">3</span>)</h2>
        <ul id="tasks">
          <li class="task-item" id="task-1" data-status="active" data-priority="high">
            <input type="checkbox" class="task-check">
            <span class="task-title">Write benchmark tests</span>
            <span class="task-priority">HIGH</span>
            <button class="delete-task" data-id="1">✕</button>
          </li>
          <li class="task-item" id="task-2" data-status="done" data-priority="medium">
            <input type="checkbox" class="task-check" checked>
            <span class="task-title">Set up Docker environment</span>
            <span class="task-priority">MEDIUM</span>
            <button class="delete-task" data-id="2">✕</button>
          </li>
          <li class="task-item" id="task-3" data-status="active" data-priority="low">
            <input type="checkbox" class="task-check">
            <span class="task-title">Review pull request</span>
            <span class="task-priority">LOW</span>
            <button class="delete-task" data-id="3">✕</button>
          </li>
        </ul>
        <p id="task-stats">TASK_STATS_TOTAL_3_ACTIVE_2_DONE_1</p>
      </div>
    </section>
  </main>
  <script>
    let taskCount = 3;
    let tasks = [];

    // Load tasks from localStorage on page load
    function loadTasks() {
      const saved = localStorage.getItem('tasks');
      if (saved) {
        tasks = JSON.parse(saved);
        taskCount = tasks.length;
        renderTasks();
      } else {
        // Initialize default tasks
        tasks = [
          { id: 1, title: 'Write benchmark tests', status: 'active', priority: 'high' },
          { id: 2, title: 'Set up Docker environment', status: 'done', priority: 'medium' },
          { id: 3, title: 'Review pull request', status: 'active', priority: 'low' }
        ];
        saveTasks();
        renderTasks();
      }
    }

    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function renderTasks() {
      const tasksList = document.getElementById('tasks');
      tasksList.innerHTML = '';
      let activeCount = 0;
      let doneCount = 0;
      
      tasks.forEach(task => {
        if (task.status === 'active') activeCount++;
        if (task.status === 'done') doneCount++;
        
        const li = document.createElement('li');
        li.className = 'task-item';
        li.id = `task-${task.id}`;
        li.dataset.status = task.status;
        li.dataset.priority = task.priority;
        li.innerHTML = `
          <input type="checkbox" class="task-check" ${task.status === 'done' ? 'checked' : ''}>
          <span class="task-title">${task.title}</span>
          <span class="task-priority">${task.priority.toUpperCase()}</span>
          <button class="delete-task" data-id="${task.id}">✕</button>
          ${task.title.includes('Persistent') ? '<span>TASK_PERSISTENT_TEST_FOUND_AFTER_RELOAD</span>' : ''}
        `;
        tasksList.appendChild(li);
      });
      
      document.getElementById('total-count').textContent = tasks.length;
      document.getElementById('task-stats').textContent = `TASK_STATS_TOTAL_${tasks.length}_ACTIVE_${activeCount}_DONE_${doneCount}`;
    }

    document.getElementById('add-task-btn').addEventListener('click', function() {
      const title = document.getElementById('new-task-input').value.trim();
      const priority = document.getElementById('priority-select').value;
      if (!title) return;
      taskCount++;
      const newTask = { id: taskCount, title: title, status: 'active', priority: priority };
      tasks.push(newTask);
      saveTasks();
      renderTasks();
      document.getElementById('new-task-input').value = '';
      // Show verification span
      const taskEl = document.getElementById(`task-${taskCount}`);
      if (taskEl) {
        const span = document.createElement('span');
        span.textContent = `TASK_ADDED_${title.replace(/\s/g,'_').toUpperCase()}_PRIORITY_${priority.toUpperCase()}`;
        taskEl.appendChild(span);
      }
    });

    document.getElementById('tasks').addEventListener('click', function(e) {
      if (e.target.classList.contains('delete-task')) {
        const id = parseInt(e.target.dataset.id);
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        renderTasks();
      }
    });

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
    }

    // Load tasks on page load
    loadTasks();
  </script>
</body>
</html>
